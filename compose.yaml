x-service-build: &service-build
  context: .
  dockerfile: services/Dockerfile

# Run app services as the host user in local development so bind-mounted
# snapshots are not created as root-owned files on the host.
x-host-user: &host-user "${HOST_UID:-1000}:${HOST_GID:-1000}"

services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info -X brokers=redpanda:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  ingestor:
    image: wikistream-observatory/ingestor:local
    user: *host-user
    build:
      <<: *service-build
      target: ingestor
    environment:
      WIKISTREAM_MODE: ${WIKISTREAM_MODE:-live}
      WIKISTREAM_KAFKA_BOOTSTRAP_SERVERS: ${WIKISTREAM_KAFKA_BOOTSTRAP_SERVERS:-redpanda:9092}
      WIKISTREAM_RAW_TOPIC: ${WIKISTREAM_RAW_TOPIC:-raw_recentchange}
      WIKISTREAM_REPLAY_PATH: ${WIKISTREAM_REPLAY_PATH:-/app/data/replay/recentchange_sample.jsonl}
      WIKISTREAM_USER_AGENT: ${WIKISTREAM_USER_AGENT:-wikistream-observatory-local/0.1}
    volumes:
      - ./data/replay:/app/data/replay:ro
    depends_on:
      redpanda:
        condition: service_healthy

  processor:
    image: wikistream-observatory/processor:local
    user: *host-user
    build:
      <<: *service-build
      target: processor
    environment:
      WIKISTREAM_MODE: ${WIKISTREAM_MODE:-live}
      WIKISTREAM_KAFKA_BOOTSTRAP_SERVERS: ${WIKISTREAM_KAFKA_BOOTSTRAP_SERVERS:-redpanda:9092}
      WIKISTREAM_RAW_TOPIC: ${WIKISTREAM_RAW_TOPIC:-raw_recentchange}
      WIKISTREAM_SNAPSHOT_PATH: ${WIKISTREAM_SNAPSHOT_PATH:-/app/data/snapshots}
      WIKISTREAM_FRESHNESS_SECONDS: ${WIKISTREAM_FRESHNESS_SECONDS:-60}
      WIKISTREAM_SNAPSHOT_INTERVAL_SECONDS: ${WIKISTREAM_SNAPSHOT_INTERVAL_SECONDS:-15}
      WIKISTREAM_SIGNAL_THRESHOLD_RATIO: ${WIKISTREAM_SIGNAL_THRESHOLD_RATIO:-3.0}
      WIKISTREAM_SIGNAL_MIN_EVENTS: ${WIKISTREAM_SIGNAL_MIN_EVENTS:-20}
    volumes:
      - ./data/snapshots:/app/data/snapshots
    depends_on:
      redpanda:
        condition: service_healthy

  dashboard:
    image: wikistream-observatory/dashboard:local
    user: *host-user
    build:
      <<: *service-build
      target: dashboard
    environment:
      WIKISTREAM_MODE: ${WIKISTREAM_MODE:-live}
      WIKISTREAM_SNAPSHOT_PATH: ${WIKISTREAM_SNAPSHOT_PATH:-/app/data/snapshots}
      WIKISTREAM_FRESHNESS_SECONDS: ${WIKISTREAM_FRESHNESS_SECONDS:-60}
      WIKISTREAM_DASHBOARD_REFRESH_SECONDS: ${WIKISTREAM_DASHBOARD_REFRESH_SECONDS:-15}
    ports:
      - "8501:8501"
    volumes:
      - ./data/snapshots:/app/data/snapshots:ro
    depends_on:
      - processor

volumes:
  redpanda-data:
